name: Conventional Commits

on:
  pull_request:
    branches: [master]

jobs:
  check:
    name: Check commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: cocogitto/cocogitto-action@v3
        with:
          check: true
          check-latest-tag-only: true
