# Cocogitto configuration — https://docs.cocogitto.io/

[changelog]
path = "CHANGELOG.md"
template = "keepachangelog"
remote = "github.com"
repository = "cargo-rig"
owner = "anthonyoteri"
authors = [
  { username = "anthonyoteri", signature = "Anthony Oteri" },
]

[bump]
# Update the workspace version in Cargo.toml before committing the release.
pre_bump_hooks = [
  "cargo set-version {{version}}",
  "cargo check --workspace",
  "git add Cargo.toml Cargo.lock",
]

[commit_types]
feat     = { changelog_title = "Features" }
fix      = { changelog_title = "Bug Fixes" }
perf     = { changelog_title = "Performance" }
refactor = { changelog_title = "Refactoring" }
docs     = { changelog_title = "Documentation" }
test     = { changelog_title = "Tests" }
ci       = { changelog_title = "CI/CD" }
chore    = { changelog_title = "Miscellaneous", omit_from_changelog = true }

[git_hooks]
# Enforce conventional commits locally.
# Install with: cog install-hooks
commit-msg = """
cog verify --file $1
"""
